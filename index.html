<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IQ Test</title>
<meta name="google-site-verification" content="NW8AQuykLEeTzTr6KgBz56T4-hlRgDA1DU5aq6ZWyvM" />
<meta name="keywords" content="IQ test, gratis IQ test, intelligenstest, logik test, talserier test, IQ test svenska, online IQ test">
<meta name="description" content="Gör vårt gratis IQ-test online på svenska. 10 slumpade frågor inom logik, talserier och problemlösning. Få din uppskattade IQ direkt och dela ditt resultat.">
<meta name="robots" content="index, Contact">
<link rel="stylesheet" href="./index.css">
<link rel="stylesheet" href="./modal.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>
    <div class="statistics" id="statistics">
        <h3>Statistik</h3>
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-6">
        <path stroke-linecap="round" stroke-linejoin="round" d="M7.5 14.25v2.25m3-4.5v4.5m3-6.75v6.75m3-9v9M6 20.25h12A2.25 2.25 0 0 0 20.25 18V6A2.25 2.25 0 0 0 18 3.75H6A2.25 2.25 0 0 0 3.75 6v12A2.25 2.25 0 0 0 6 20.25Z" />
        </svg>
    </div>
<img src="https://gjoshi99.github.io/Free-IQ-Test/iqgame.png"  class="backgroundImage">
<div class="container">
    <div class="card" id="card">
        <div class="progress">
            <div class="progress-bar" id="progressBar"></div>
        </div>

        <div id="content"></div>
    </div>
</div>

<script src="questions.js"></script>
<script defer>
const http = "https://albanianchat.se/game";



let currentQuestion = 0;
let score = 0;
let selectedAnswer = null;

let questions = []

function takeTenQuestion(params) {
    for (let i = 0; i < 10; i++) {
         const randomIndex = Math.floor(Math.random() * allQuestions.length)
         questions.push(allQuestions[randomIndex])
    }
}

takeTenQuestion();


function renderQuestion() {
    const q = questions[currentQuestion];
    const total = questions.length;

    document.getElementById("progressBar").style.width =
        ((currentQuestion) / total) * 100 + "%";

    document.getElementById("content").innerHTML = `
        <div class="question-number">Fråga ${currentQuestion + 1} av ${total}</div>
        <div class="question">${q.q}</div>
        ${q.options.map((opt, i) => `
            <div class="option" onclick="selectOption(${i}, this)">
                ${opt}
            </div>
        `).join("")}
        <button id="nextBtn" onclick="nextQuestion()">Nästa</button>
    `;

    selectedAnswer = null;
}

function selectOption(index, element) {
    document.querySelectorAll(".option").forEach(el =>
        el.classList.remove("selected")
    );

    element.classList.add("selected");
    selectedAnswer = index;

    const btn = document.getElementById("nextBtn");
    btn.classList.add("enabled");
}

function nextQuestion() {
    if (selectedAnswer === null) return;

    if (selectedAnswer === questions[currentQuestion].answer) {
        score++;
    }

    currentQuestion++;

    if (currentQuestion < questions.length) {
        renderQuestion();
    } else {
        showResult();
    }
}

function showResult() {
    const total = questions.length;
    const percentage = score / total;
    let iq = Math.round(70 + (percentage * 60));


    document.getElementById("progressBar").style.width = "100%";

    document.getElementById("content").innerHTML = `
        <div class="result">
            <div id="resultCard" class="share-card">
                <h2>IQ RESULT</h2>
                <p>Resultat: ${score} / ${total}</p>
                <h1>${iq}</h1>
                <p>Uppskattad IQ</p>
            </div>

            <button onclick="downloadCard()" class="enabled">Ladda ner</button>
            <button onclick="shareCard()" class="enabled">Dela</button>
            <button onclick="location.reload()" class="enabled">Spela igen</button>
            <button onclick="showProfile(${iq})" class="enabled" >Publicera Resultat</button>
        </div>
    `;

}

async function downloadCard() {
    const card = document.getElementById("resultCard");
    if (!card) return;

    const canvas = await html2canvas(card, {
        scale: 2
    });

    const link = document.createElement("a");
    link.download = "iq-result.png";
    link.href = canvas.toDataURL("image/png");
    link.click();
}

async function shareCard() {
    const card = document.getElementById("resultCard");

    const canvas = await html2canvas(card);
    const blob = await new Promise(resolve =>
        canvas.toBlob(resolve, "image/png")
    );

    const file = new File([blob], "iq-result.png", { type: "image/png" });

    if (navigator.share) {
        await navigator.share({
            files: [file],
            title: "Mitt IQ-resultat",
            text: "Kolla mitt IQ-resultat!"
        });
    } else {
        alert("Delning stöds inte i denna webbläsare.");
    }
}

renderQuestion();


function showProfile(iq) {
    let createModal = document.createElement('div');
    let createModalView = document.createElement('div');
    let createModalTitle = document.createElement("h1");
    let createModalInput = document.createElement("input");
    let createModalResult = document.createElement('p');
    let createModalCloseButton = document.createElement('button');
    let createModalPublishButton = document.createElement("button");

    createModal.classList.add('createModal');
    createModalView.classList.add('createModalView');
    createModalInput.classList.add('createModalInput');
    createModalTitle.classList.add('createModalTitle');
    createModalResult.classList.add('createModalResult');
    createModalCloseButton.classList.add('createModalCloseButton');
    createModalPublishButton.classList.add('createModalPublishButton');


    if(document?.cookie.length > 0){
        const [userId,cookieUsernameObj] = document.cookie.split(';');
        const [key,cookieUsername] = cookieUsernameObj.split('=');
        createModalInput.value = cookieUsername
    }
    createModalTitle.textContent = "Publicera ditt resultat";
    createModalResult.textContent = `Genom att klicka på publicera knappen kommer du att publicera detta resultat och alla 
    spelare i världen kommer kunna se ditt IQ-resultat, ditt resultat är ${iq}
    `
    createModalInput.placeholder = "Vad heter du?";
    createModalCloseButton.textContent = "stäng";
    createModalPublishButton.textContent = "Publicera";



    document.body.appendChild(createModal)
    createModal.appendChild(createModalCloseButton)
    createModal.appendChild(createModalView);
    createModalView.appendChild(createModalTitle);
    createModalView.appendChild(createModalInput);
    createModalView.appendChild(createModalResult);
    createModalView.appendChild(createModalPublishButton);


    createModalCloseButton.addEventListener('click', () => {
        const durationTime = 500
        createModal.animate([
            {
                transform: "translateY(0px)"
            },
            {
                transform: `translateY(${createModal.offsetHeight}px)`
            }
            ],
            {
                duration: durationTime,
                easing: "ease-out"
            })

        setTimeout(() => {
            createModal.remove();
        }, durationTime);
    })



    createModalPublishButton.addEventListener('click', () => {
        const username = createModalInput.value;
        console.log(username.length)
        if(username.length <= 0) return alert('Du måste ha ett namn vid publicering');

        SendData(username)
    })
}



async function SendData(username) {
    const total = questions.length;
    const percentage = score / total;
    let iq = Math.round(70 + (percentage * 60));
    const [userId,cookieUsernameObj] = document.cookie.split(';');
    const [key,token] = userId.split('=');


    const data = {
        total,
        correctAnswers: score / total,
        result: iq,
        username,
        token,
    }
    const res = await fetch(http + "/stats",{
        method: "POST",
        headers: {"content-type": "application/json"},
        credentials: "include",
        body: JSON.stringify(data)
    })
    
    const resJson = await res.json();

    if(res.status !== 200){
        alert(resJson.message);
        return
    }

    if(resJson.token){
        document.cookie = `userId=${resJson.token}`;
        document.cookie = `username=${resJson.username}`,
        console.log(resJson.message);
    }


    if(resJson.redirectTo){
        redirectToStatistics();
    }
}



const statistics = document.getElementById('statistics');

function redirectToStatistics() {
    window.location.assign('https://gjoshi99.github.io/Free-IQ-Test/statistics.html')
}

statistics.addEventListener('click', () => redirectToStatistics())

</script>

</body>
</html>
