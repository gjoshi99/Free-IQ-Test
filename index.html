<style>
:root {
    --primary: #4f46e5;
    --bg: #f8fafc;
    --card: #ffffff;
    --border: #e2e8f0;
}

body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.container {
    width: 100%;
    max-width: 700px;
    padding: 30px;
    z-index: 10;
}

.card {
    background: var(--card);
    padding: 40px;
    border-radius: 16px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.08);
    transition: 0.3s ease;
}

.progress {
    height: 6px;
    background: var(--border);
    border-radius: 10px;
    overflow: hidden;
    margin-bottom: 25px;
}

.progress-bar {
    height: 100%;
    width: 0%;
    background: var(--primary);
    transition: width 0.3s ease;
}

.question-number {
    font-size: 14px;
    color: #64748b;
    margin-bottom: 10px;
}

.question {
    font-size: 22px;
    margin-bottom: 25px;
}

.option {
    padding: 14px 16px;
    border: 1px solid var(--border);
    border-radius: 10px;
    margin-bottom: 12px;
    cursor: pointer;
    transition: 0.2s;
}

.option:hover {
    border-color: var(--primary);
    background: #eef2ff;
}

.option.selected {
    background: var(--primary);
    color: white;
    border-color: var(--primary);
}

button {
    margin-top: 20px;
    padding: 12px 20px;
    border-radius: 8px;
    border: none;
    background: var(--primary);
    color: white;
    font-size: 16px;
    cursor: pointer;
    width: 100%;
    opacity: 0.5;
    transition: 0.2s;
}

button.enabled {
    opacity: 1;
}

.result {
    text-align: center;
}

.result h2 {
    font-size: 28px;
}

.result p {
    font-size: 18px;
}
.backgroundImage{
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 0;
    opacity: 0.2;
    aspect-ratio: 1;
}
.share-card {
    background: linear-gradient(135deg, #4f46e5, #6366f1);
    color: white;
    padding: 40px;
    border-radius: 20px;
    margin-bottom: 20px;
    text-align: center;
    box-shadow: 0 20px 50px rgba(0,0,0,0.2);
}

.share-card h1 {
    font-size: 60px;
    margin: 10px 0;
}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<body>
<img src="/iqgame.png"  class="backgroundImage">

<div class="container">
    <div class="card" id="card">
        <div class="progress">
            <div class="progress-bar" id="progressBar"></div>
        </div>

        <div id="content"></div>
    </div>
</div>

<script src="questions.js"></script>
<script>
let currentQuestion = 0;
let score = 0;
let selectedAnswer = null;

let questions = []

function takeTenQuestion(params) {
    for (let i = 0; i < 10; i++) {
         const randomIndex = Math.floor(Math.random() * allQuestions.length)
         questions.push(allQuestions[randomIndex])
    }
    console.log(questions)
    console.log(questions.length)
}

takeTenQuestion();


function renderQuestion() {
    const q = questions[currentQuestion];
    const total = questions.length;

    document.getElementById("progressBar").style.width =
        ((currentQuestion) / total) * 100 + "%";

    document.getElementById("content").innerHTML = `
        <div class="question-number">Fråga ${currentQuestion + 1} av ${total}</div>
        <div class="question">${q.q}</div>
        ${q.options.map((opt, i) => `
            <div class="option" onclick="selectOption(${i}, this)">
                ${opt}
            </div>
        `).join("")}
        <button id="nextBtn" onclick="nextQuestion()">Nästa</button>
    `;

    selectedAnswer = null;
}

function selectOption(index, element) {
    document.querySelectorAll(".option").forEach(el =>
        el.classList.remove("selected")
    );

    element.classList.add("selected");
    selectedAnswer = index;

    const btn = document.getElementById("nextBtn");
    btn.classList.add("enabled");
}

function nextQuestion() {
    if (selectedAnswer === null) return;

    if (selectedAnswer === questions[currentQuestion].answer) {
        score++;
    }

    currentQuestion++;

    if (currentQuestion < questions.length) {
        renderQuestion();
    } else {
        showResult();
    }
}

function showResult() {
    const total = questions.length;
    const percentage = score / total;
    let iq = Math.round(70 + (percentage * 60));

    document.getElementById("progressBar").style.width = "100%";

    document.getElementById("content").innerHTML = `
        <div class="result">
            <div id="resultCard" class="share-card">
                <h2>IQ RESULT</h2>
                <p>Resultat: ${score} / ${total}</p>
                <h1>${iq}</h1>
                <p>Uppskattad IQ</p>
            </div>

            <button onclick="downloadCard()" class="enabled">Ladda ner</button>
            <button onclick="shareCard()" class="enabled">Dela</button>
            <button onclick="location.reload()" class="enabled">Spela igen</button>
        </div>
    `;
}

async function downloadCard() {
    const card = document.getElementById("resultCard");
    if (!card) return;

    const canvas = await html2canvas(card, {
        scale: 2
    });

    const link = document.createElement("a");
    link.download = "iq-result.png";
    link.href = canvas.toDataURL("image/png");
    link.click();
}

async function shareCard() {
    const card = document.getElementById("resultCard");

    const canvas = await html2canvas(card);
    const blob = await new Promise(resolve =>
        canvas.toBlob(resolve, "image/png")
    );

    const file = new File([blob], "iq-result.png", { type: "image/png" });

    if (navigator.share) {
        await navigator.share({
            files: [file],
            title: "Mitt IQ-resultat",
            text: "Kolla mitt IQ-resultat!"
        });
    } else {
        alert("Delning stöds inte i denna webbläsare.");
    }
}

renderQuestion();
</script>
